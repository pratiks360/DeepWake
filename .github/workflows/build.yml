name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compute version
        id: ver
        run: |
          VERSION_NAME=$(./gradlew -q :app:printVersionName)
          echo "tag=v${VERSION_NAME}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Rename APKs with version
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk \
            "release-assets/DeepWake-${{ steps.ver.outputs.tag }}-debug.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
            "release-assets/DeepWake-${{ steps.ver.outputs.tag }}-release-unsigned.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: release-assets/DeepWake-${{ steps.ver.outputs.tag }}-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: release-assets/DeepWake-${{ steps.ver.outputs.tag }}-release-unsigned.apk

      - name: Delete previous releases and tags
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api="https://api.github.com/repos/${{ github.repository }}"

          # Releases are a GitHub object, not a git object, so removing them needs
          # the REST API rather than a plain git command.
          for id in $(curl -s -H "Authorization: token $GITHUB_TOKEN" "$api/releases" | jq -r '.[].id'); do
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$api/releases/$id"
          done

          # The underlying tags ARE git objects - delete those with plain git.
          git fetch --tags
          for tag in $(git tag -l 'v*'); do
            git push origin ":refs/tags/$tag" || true
            git tag -d "$tag" || true
          done

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: |
            release-assets/DeepWake-${{ steps.ver.outputs.tag }}-debug.apk
            release-assets/DeepWake-${{ steps.ver.outputs.tag }}-release-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
